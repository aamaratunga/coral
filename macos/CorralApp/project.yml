name: CorralApp
options:
  bundleIdPrefix: com.corral
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"

targets:
  CorralApp:
    type: application
    platform: macOS
    sources:
      - CorralApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.corral.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_ENTITLEMENTS: ""
        ENABLE_APP_SANDBOX: "NO"
        PRODUCT_NAME: Corral
    dependencies:
      - package: SwiftTerm
    info:
      path: CorralApp/Info.plist
      properties:
        CFBundleName: Corral
        CFBundleDisplayName: Corral
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "15.0"
        NSMainStoryboardFile: ""

  CorralAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - CorralAppTests
    dependencies:
      - target: CorralApp
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        GENERATE_INFOPLIST_FILE: "YES"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Corral.app/Contents/MacOS/Corral"

schemes:
  CorralApp:
    build:
      targets:
        CorralApp: all
        CorralAppTests: [test]
    test:
      targets:
        - CorralAppTests
